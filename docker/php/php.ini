; =============================================================================
; SecureScan — Configuration PHP personnalisée
;
; Ce fichier est chargé dans les stages DEV et PROD via :
;   COPY docker/php/php.ini ${PHP_INI_DIR}/conf.d/securescan.ini
;
; Les overrides spécifiques PROD (opcache.validate_timestamps=0, etc.)
; sont ajoutés directement dans le Dockerfile stage PROD.
; =============================================================================

; ── Mémoire ───────────────────────────────────────────────────────────────────
; 512 Mo pour absorber les sorties JSON Semgrep potentiellement volumineuses
; (plusieurs milliers de findings sur de gros repos).
memory_limit = 512M

; ── Timeouts ─────────────────────────────────────────────────────────────────
; max_execution_time : les scans Semgrep peuvent durer plusieurs minutes.
; Nginx est configuré avec fastcgi_read_timeout=300s en cohérence.
max_execution_time = 300
max_input_time = 300

; ── Uploads ──────────────────────────────────────────────────────────────────
; Pour d'éventuels fichiers de règles Semgrep uploadés via l'interface.
upload_max_filesize = 50M
post_max_size = 50M

; ── Internationalisation ─────────────────────────────────────────────────────
default_charset = UTF-8
date.timezone = Europe/Paris

; ── Gestion des erreurs ───────────────────────────────────────────────────────
; display_errors = Off : les erreurs PHP NE doivent PAS être envoyées dans le
; corps de la réponse HTTP. Si elles l'étaient, elles corrompraient les réponses
; JSON (ex: "Unexpected token '<'") car elles génèrent du HTML (<br /><b>).
; Symfony gère lui-même l'affichage des erreurs via APP_DEBUG / le profiler.
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL
log_errors = On
; Le dossier /var/log/php/ doit exister (créé dans l'entrypoint)
error_log = /tmp/php-error.log

; ── OPcache ──────────────────────────────────────────────────────────────────
; Configuration de base, optimisée en PROD dans le Dockerfile.
opcache.enable = 1
opcache.enable_cli = 0
; Taille du segment de mémoire partagée pour le bytecode compilé
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
; Nombre de fichiers PHP pouvant être mis en cache
; Symfony 6 + ses dépendances ≈ 6 000–10 000 fichiers
opcache.max_accelerated_files = 10000
; validate_timestamps=1 en DEV : PHP recompile si le fichier est modifié
; Mis à 0 en PROD (dans Dockerfile) pour de meilleures performances
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; ── Sécurité ─────────────────────────────────────────────────────────────────
; Ne pas exposer la version PHP dans les headers HTTP (X-Powered-By)
expose_php = Off
; Cookies de session sécurisés
session.cookie_httponly = 1
session.use_strict_mode = 1
session.cookie_samesite = "Lax"

; ── Réalpath cache ───────────────────────────────────────────────────────────
; Optimise la résolution des chemins de fichiers (important pour Symfony).
realpath_cache_size = 4096K
realpath_cache_ttl = 600
