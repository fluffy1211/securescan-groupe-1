# =============================================================================
# SecureScan — Configuration Nginx pour Symfony 6.x
#
# Référence officielle :
# https://symfony.com/doc/current/setup/web_server_configuration.html
#
# Architecture :
#   Client HTTP → Nginx (port 80) → FastCGI → PHP-FPM (app:9000)
#
# Règle de sécurité clé :
#   Seul public/index.php est exécutable via PHP-FPM (bloc `internal`).
#   Tout autre fichier .php renvoie 404.
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    # Accepte toutes les requêtes quel que soit le Host header.
    # En production, remplacer _ par le vrai domaine (ex: securescan.example.com)
    server_name _;

    # Racine publique Symfony — seul ce dossier est exposé à Nginx
    root /var/www/html/public;

    # Index par défaut (Symfony utilise index.php comme front controller)
    index index.php;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/securescan_access.log;
    error_log  /var/log/nginx/securescan_error.log warn;

    # ── Compression Gzip ─────────────────────────────────────────────────────
    # Réduit la bande passante pour les réponses JSON (résultats Semgrep)
    # et les assets textuels (CSS, JS).
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        text/javascript
        application/xml
        application/xml+rss;

    # ── Taille maximale des requêtes ─────────────────────────────────────────
    # Adapté pour d'éventuels uploads de fichiers de configuration Semgrep
    client_max_body_size 50M;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    # Les scans Semgrep sur de gros repos peuvent prendre plusieurs minutes.
    # Ces timeouts évitent que Nginx ferme la connexion avant la fin du scan.
    # fastcgi_read_timeout est le délai d'attente de la réponse PHP-FPM.
    fastcgi_read_timeout 300s;
    fastcgi_send_timeout 300s;
    fastcgi_connect_timeout 60s;

    # ── Buffers FastCGI ───────────────────────────────────────────────────────
    # Les résultats JSON Semgrep peuvent être volumineux (> 1 Mo).
    # Ces buffers évitent que Nginx écrive la réponse sur disque (tmp file).
    fastcgi_buffer_size          128k;
    fastcgi_buffers              16 128k;
    fastcgi_busy_buffers_size    256k;

    # ── Assets statiques — servis directement par Nginx ──────────────────────
    # Nginx sert CSS, JS, images sans passer par PHP-FPM → gain de performance.
    # Cache navigateur d'un an pour les fichiers versionnés (immutable).
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Renvoie 404 si le fichier n'existe pas (plutôt que passer à PHP)
        try_files $uri =404;
        access_log off;
    }

    # ── PDF/CSV téléchargeables (exports SecureScan) ──────────────────────────
    location ~* \.(pdf|csv)$ {
        expires 1h;
        add_header Cache-Control "private, must-revalidate";
        try_files $uri /index.php$is_args$args;
    }

    # ── Front controller Symfony ──────────────────────────────────────────────
    # Toute requête qui ne correspond pas à un fichier existant est renvoyée
    # vers index.php (pattern "try_files" recommandé par Symfony).
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # ── Exécution PHP via FastCGI ─────────────────────────────────────────────
    # IMPORTANT : uniquement index.php est exécutable (sécurité).
    # Le modificateur `internal` interdit l'accès direct depuis le navigateur :
    # http://localhost/index.php → 404 (Nginx redirige en interne seulement).
    location ~ ^/index\.php(/|$) {
        # Upstream PHP-FPM (nom du service Docker Compose)
        fastcgi_pass app:9000;

        # Sépare le script PHP du PATH_INFO (/index.php → /index.php + "")
        fastcgi_split_path_info ^(.+\.php)(/.*)$;

        # Paramètres FastCGI standard
        include fastcgi_params;

        # SCRIPT_FILENAME : chemin absolu vers le script PHP à exécuter
        # $realpath_root : résout les symlinks (important si public/ est un lien)
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        # Transmettre l'IP réelle du client à Symfony (pour les logs, rate limiting)
        fastcgi_param REMOTE_ADDR     $remote_addr;

        # Ce bloc est uniquement accessible via redirection interne Nginx
        internal;
    }

    # ── Bloquer tout autre fichier PHP ────────────────────────────────────────
    # Empêche l'exécution de fichiers PHP placés accidentellement dans public/
    location ~ \.php$ {
        return 404;
    }

    # ── Bloquer les fichiers et dossiers cachés ───────────────────────────────
    # Protège .env, .git, .htaccess, etc.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Bloquer l'accès aux fichiers de configuration sensibles ──────────────
    location ~* \.(env|lock|json|yaml|yml|xml|ini|dist)$ {
        # Autoriser public/build/manifest.json (assets Symfony Encore)
        # en ajoutant une exception si nécessaire.
        deny all;
        return 404;
    }
}
